<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Remote Term</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: #1a1b26; color: #c0caf5; font-family: system-ui, sans-serif; touch-action: manipulation; }

#app { display: flex; flex-direction: column; height: 100dvh; }

/* Hosts page */
#hosts-page {
  position: fixed; inset: 0; z-index: 100;
  background: #1a1b26; display: flex; flex-direction: column;
  overflow: hidden;
}
#hosts-page.hidden { display: none; }

.hosts-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px; flex-shrink: 0;
}
.hosts-header h1 { font-size: 22px; font-weight: 700; color: #c0caf5; }
.hosts-header-actions { display: flex; gap: 8px; }
.host-add-btn, .host-quick-btn {
  width: 40px; height: 40px; border: none; border-radius: 10px;
  background: #7aa2f7; color: #1a1b26; font-size: 22px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.host-quick-btn { background: #3b4261; color: #7aa2f7; font-size: 16px; }
.host-add-btn:active, .host-quick-btn:active { opacity: 0.8; }

.hosts-list {
  flex: 1; overflow-y: auto; padding: 0 16px 16px;
  -webkit-overflow-scrolling: touch;
}

.hosts-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: #565f89; text-align: center; padding: 40px;
}
.hosts-empty .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.hosts-empty p { font-size: 14px; line-height: 1.6; }

.host-card {
  display: flex; align-items: center; padding: 14px 16px;
  background: #24283b; border-radius: 10px; margin-bottom: 8px;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  border: 1px solid transparent; transition: border-color 0.15s;
  position: relative; overflow: hidden;
}
.host-card:active { border-color: #7aa2f7; }
.host-card-icon {
  width: 40px; height: 40px; border-radius: 8px;
  background: #3b4261; display: flex; align-items: center; justify-content: center;
  font-size: 18px; margin-right: 14px; flex-shrink: 0; color: #7aa2f7;
}
.host-card-info { flex: 1; min-width: 0; }
.host-card-label {
  font-size: 15px; font-weight: 600; color: #c0caf5;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.host-card-detail {
  font-size: 12px; color: #565f89; margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.host-card-actions {
  display: flex; gap: 4px; flex-shrink: 0; margin-left: 8px;
}
.host-card-actions button {
  width: 32px; height: 32px; border: none; border-radius: 6px;
  background: transparent; color: #565f89; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.host-card-actions button:active { background: #3b4261; }
.host-card-actions .delete-btn:active { color: #f7768e; }
.host-status {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-left: 8px;
  background: #3b4261; transition: background 0.3s;
}
.host-status.online { background: #9ece6a; }
.host-status.offline { background: #f7768e; }
.host-status.checking { background: #e0af68; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* Host edit overlay */
#host-edit-overlay {
  position: fixed; inset: 0; z-index: 110;
  background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center;
}
#host-edit-overlay.hidden { display: none; }
#host-edit-form {
  width: 90%; max-width: 360px; padding: 24px; border-radius: 12px;
  background: #24283b; border: 1px solid #3b4261;
}
#host-edit-form h2 { text-align: center; margin-bottom: 18px; color: #7aa2f7; font-size: 20px; }
#host-edit-form .field { margin-bottom: 12px; }
#host-edit-form label { display: block; font-size: 12px; color: #565f89; margin-bottom: 4px; }
#host-edit-form input {
  width: 100%; padding: 10px 12px; border-radius: 6px; border: 1px solid #3b4261;
  background: #1a1b26; color: #c0caf5; font-size: 16px; outline: none;
}
#host-edit-form input:focus { border-color: #7aa2f7; }
.field-row { display: flex; gap: 10px; }
.field-row .field { flex: 1; }
.field-row .field.port { flex: 0 0 80px; }
.edit-btn-row { display: flex; gap: 8px; margin-top: 4px; }
.edit-btn-row button {
  flex: 1; padding: 12px; border: none; border-radius: 6px;
  font-size: 16px; font-weight: 600; cursor: pointer;
}
#host-save-btn { background: #7aa2f7; color: #1a1b26; }
#host-save-btn:active { background: #89b4fa; }
#host-cancel-btn { background: #3b4261; color: #c0caf5; }
#host-cancel-btn:active { background: #545c7e; }
#host-edit-error { color: #f7768e; font-size: 13px; margin-top: 10px; text-align: center; min-height: 20px; }

/* Quick connect overlay (no save) */
#login-overlay {
  position: fixed; inset: 0; z-index: 110;
  background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center;
}
#login-overlay.hidden { display: none; }
#login-form {
  width: 90%; max-width: 360px; padding: 24px; border-radius: 12px;
  background: #24283b; border: 1px solid #3b4261;
}
#login-form h2 { text-align: center; margin-bottom: 18px; color: #7aa2f7; font-size: 20px; }
#login-form .field { margin-bottom: 12px; }
#login-form label { display: block; font-size: 12px; color: #565f89; margin-bottom: 4px; }
#login-form input {
  width: 100%; padding: 10px 12px; border-radius: 6px; border: 1px solid #3b4261;
  background: #1a1b26; color: #c0caf5; font-size: 16px; outline: none;
}
#login-form input:focus { border-color: #7aa2f7; }
#ssh-connect-btn {
  width: 100%; padding: 12px; border: none; border-radius: 6px;
  background: #7aa2f7; color: #1a1b26; font-size: 16px; font-weight: 600;
  cursor: pointer; margin-top: 4px;
}
#ssh-connect-btn:active { background: #89b4fa; }
#ssh-connect-btn:disabled { background: #3b4261; color: #565f89; cursor: not-allowed; }
.login-btn-row { display: flex; gap: 8px; margin-top: 4px; }
.login-btn-row button {
  flex: 1; padding: 12px; border: none; border-radius: 6px;
  font-size: 16px; font-weight: 600; cursor: pointer;
}
#quick-back-btn { background: #3b4261; color: #c0caf5; }
#quick-back-btn:active { background: #545c7e; }
#ssh-error { color: #f7768e; font-size: 13px; margin-top: 10px; text-align: center; min-height: 20px; }

/* Terminal area - top half */
#terminal-wrap {
  flex: 1; min-height: 0; position: relative; background: #1a1b26;
}
#terminal { height: 100%; overflow: hidden; transition: transform 0.1s ease-out; }
#terminal .xterm { height: 100%; padding: 4px; }
#terminal .xterm-viewport { touch-action: none; }

/* Status bar */
#status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 10px; background: #24283b; font-size: 12px; color: #565f89;
  border-top: 1px solid #3b4261; border-bottom: 1px solid #3b4261;
  flex-shrink: 0;
}
#status-bar .dot { width: 8px; height: 8px; border-radius: 50%; background: #f7768e; margin-right: 6px; display: inline-block; }
#status-bar .dot.connected { background: #9ece6a; }
#status-bar .cb-btns { display: flex; gap: 6px; }
.cb-btn {
  border: none; border-radius: 4px; padding: 3px 10px;
  background: #3b4261; color: #7aa2f7; font-size: 12px; font-weight: 600;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.cb-btn:active { background: #545c7e; }
.cb-btn.flash { background: #9ece6a; color: #1a1b26; transition: none; }
#select-mode-btn.active { background: #e0af68; color: #1a1b26; }

/* Keyboard area - bottom half */
#keyboard {
  flex-shrink: 0; background: #1f2335; padding: 6px 4px;
  user-select: none; -webkit-user-select: none;
}

/* Paste row */
.paste-row {
  display: flex; gap: 3px; margin-bottom: 3px; padding: 0 2px;
}
.paste-row input {
  flex: 1; height: 36px; border: 1px solid #3b4261; border-radius: 6px;
  background: #1a1b26; color: #c0caf5; font-size: 14px; padding: 0 8px;
  outline: none;
}
.paste-row input:focus { border-color: #7aa2f7; }
.paste-row button {
  width: 64px; height: 36px; border: none; border-radius: 6px;
  background: #7aa2f7; color: #1a1b26; font-size: 13px; font-weight: 600;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.paste-row button:active { background: #89b4fa; }

/* Shortcut grid */
.shortcut-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  grid-template-rows: 36px 36px;
  gap: 3px; margin-bottom: 3px; padding: 0 2px;
}
.shortcut-key {
  border: none; border-radius: 6px;
  background: #292e42; color: #7aa2f7; font-size: 12px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.shortcut-key:active { background: #3b4261; }
.shortcut-key.tab-key {
  grid-column: 1; grid-row: 1 / 3;
}
.shortcut-key.enter-key {
  grid-column: 7; grid-row: 1 / 3;
  background: #7aa2f7; color: #1a1b26; font-size: 14px;
}
.shortcut-key.enter-key:active { background: #89b4fa; }

/* Arrow keys cluster */
.arrow-row {
  display: flex; gap: 3px; justify-content: center; margin-bottom: 3px; padding: 0 2px;
}
.arrow-key {
  flex: 1; height: 36px; border: none; border-radius: 6px;
  background: #292e42; color: #bb9af7; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  max-width: 64px;
}
.arrow-key.pg { font-size: 12px; font-weight: 600; }
.arrow-key:active { background: #3b4261; }

/* Quick action row */
.quick-row {
  display: flex; gap: 3px; margin-bottom: 3px; padding: 0 2px;
}
.quick-btn {
  flex: 1; height: 36px; border: none; border-radius: 6px;
  background: #292e42; color: #9ece6a; font-size: 12px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.quick-btn:active { background: #3b4261; }

/* Overlay dialog (file browser / prompt) */
.dialog-overlay {
  position: fixed; inset: 0; z-index: 120;
  background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center;
}
.dialog-overlay.hidden { display: none; }
.dialog-box {
  width: 90%; max-width: 360px; max-height: 70vh; border-radius: 12px;
  background: #24283b; border: 1px solid #3b4261; display: flex; flex-direction: column;
  overflow: hidden;
}
.dialog-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; border-bottom: 1px solid #3b4261; flex-shrink: 0;
}
.dialog-header h3 { font-size: 16px; color: #7aa2f7; }
.dialog-close {
  border: none; background: none; color: #565f89; font-size: 20px; cursor: pointer;
  padding: 0 4px; line-height: 1;
}
.dialog-close:active { color: #c0caf5; }

/* File browser */
.dir-path {
  padding: 8px 16px; font-size: 12px; color: #565f89;
  background: #1a1b26; border-bottom: 1px solid #3b4261;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0;
}
.dir-list {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
}
.dir-item {
  display: flex; align-items: center; padding: 10px 16px;
  border-bottom: 1px solid #1a1b26; cursor: pointer;
  color: #c0caf5; font-size: 14px;
  -webkit-tap-highlight-color: transparent;
}
.dir-item:active { background: #3b4261; }
.dir-item .icon { margin-right: 10px; color: #7aa2f7; }
.dir-item.parent { color: #565f89; }
.dialog-footer {
  padding: 10px 16px; border-top: 1px solid #3b4261; flex-shrink: 0;
}
.dialog-footer button {
  width: 100%; padding: 10px; border: none; border-radius: 6px;
  background: #7aa2f7; color: #1a1b26; font-size: 14px; font-weight: 600;
  cursor: pointer;
}
.dialog-footer button:active { background: #89b4fa; }
.dialog-footer .btn-row { display: flex; gap: 8px; }
.dialog-footer .btn-row button { flex: 1; }
.dialog-footer .upload-btn { background: #9ece6a; }
.dialog-footer .upload-btn:active { background: #73daca; }

.file-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; border-bottom: 1px solid #1a1b26;
  cursor: pointer; color: #c0caf5; font-size: 14px;
  -webkit-tap-highlight-color: transparent;
}
.file-item:active { background: #3b4261; }
.file-item .left { display: flex; align-items: center; min-width: 0; flex: 1; }
.file-item .left .icon { margin-right: 10px; color: #565f89; flex-shrink: 0; }
.file-item .left .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-item .size { color: #565f89; font-size: 12px; margin-left: 8px; flex-shrink: 0; }

.upload-status {
  padding: 8px 16px; font-size: 12px; color: #9ece6a;
  text-align: center; display: none;
}
.upload-status.show { display: block; }

/* Prompt dialog */
.prompt-body {
  padding: 16px;
}
.prompt-body input {
  width: 100%; padding: 10px 12px; border-radius: 6px; border: 1px solid #3b4261;
  background: #1a1b26; color: #c0caf5; font-size: 16px; outline: none;
}
.prompt-body input:focus { border-color: #7aa2f7; }
.prompt-actions {
  display: flex; gap: 8px; padding: 0 16px 16px;
}
.prompt-actions button {
  flex: 1; padding: 10px; border: none; border-radius: 6px;
  font-size: 14px; font-weight: 600; cursor: pointer;
}
.prompt-actions .cancel { background: #3b4261; color: #c0caf5; }
.prompt-actions .confirm { background: #7aa2f7; color: #1a1b26; }
.prompt-actions .cancel:active { background: #545c7e; }
.prompt-actions .confirm:active { background: #89b4fa; }

</style>
</head>
<body>
<!-- Hosts page -->
<div id="hosts-page">
  <div class="hosts-header">
    <h1>Hosts</h1>
    <div class="hosts-header-actions">
      <button class="host-quick-btn" id="quick-connect-btn" title="Quick Connect">&#x26A1;</button>
      <button class="host-add-btn" id="add-host-btn" title="Add Host">+</button>
    </div>
  </div>
  <div class="hosts-list" id="hosts-list"></div>
</div>

<!-- Host edit overlay -->
<div id="host-edit-overlay" class="hidden">
  <div id="host-edit-form">
    <h2 id="host-edit-title">New Host</h2>
    <div class="field"><label>Label</label><input type="text" id="edit-label" placeholder="My Server" autocapitalize="off" autocorrect="off"></div>
    <div class="field-row">
      <div class="field"><label>Host</label><input type="text" id="edit-host" placeholder="192.168.1.100" autocapitalize="off" autocorrect="off"></div>
      <div class="field port"><label>Port</label><input type="number" id="edit-port" value="22"></div>
    </div>
    <div class="field"><label>Username</label><input type="text" id="edit-user" placeholder="root" autocapitalize="off" autocorrect="off"></div>
    <div class="field"><label>Password</label><input type="password" id="edit-pass" placeholder="password"></div>
    <div class="edit-btn-row">
      <button id="host-cancel-btn">Cancel</button>
      <button id="host-save-btn">Save</button>
    </div>
    <div id="host-edit-error"></div>
  </div>
</div>

<!-- Quick connect overlay -->
<div id="login-overlay" class="hidden">
  <div id="login-form">
    <h2>Quick Connect</h2>
    <div class="field-row">
      <div class="field"><label>Host</label><input type="text" id="ssh-host" placeholder="192.168.1.100" autocapitalize="off" autocorrect="off"></div>
      <div class="field port"><label>Port</label><input type="number" id="ssh-port" value="22"></div>
    </div>
    <div class="field"><label>Username</label><input type="text" id="ssh-user" placeholder="root" autocapitalize="off" autocorrect="off"></div>
    <div class="field"><label>Password</label><input type="password" id="ssh-pass" placeholder="password"></div>
    <div class="login-btn-row">
      <button id="quick-back-btn">Back</button>
      <button id="ssh-connect-btn">Connect</button>
    </div>
    <div id="ssh-error"></div>
  </div>
</div>

<!-- File browser dialog -->
<div id="filebrowser-overlay" class="dialog-overlay hidden">
  <div class="dialog-box">
    <div class="dialog-header">
      <h3 id="fb-title">Select Folder</h3>
      <button class="dialog-close" id="fb-close">&#x2715;</button>
    </div>
    <div class="dir-path" id="fb-path"></div>
    <div class="dir-list" id="fb-list"></div>
    <div class="upload-status" id="fb-upload-status"></div>
    <div class="dialog-footer">
      <div class="btn-row">
        <button id="fb-select">cd here</button>
        <button id="fb-upload" class="upload-btn">Upload here</button>
      </div>
    </div>
  </div>
</div>

<!-- Tmux session name prompt -->
<div id="tmux-prompt-overlay" class="dialog-overlay hidden">
  <div class="dialog-box">
    <div class="dialog-header">
      <h3>New tmux Session</h3>
      <button class="dialog-close" id="tp-close">&#x2715;</button>
    </div>
    <div class="prompt-body">
      <input type="text" id="tp-name" placeholder="Session name" autocapitalize="off" autocorrect="off">
    </div>
    <div class="prompt-actions">
      <button class="cancel" id="tp-cancel">Cancel</button>
      <button class="confirm" id="tp-confirm">Create</button>
    </div>
  </div>
</div>

<div id="app">
  <div id="terminal-wrap"><div id="terminal"></div></div>
  <div id="status-bar">
    <span><span class="dot" id="status-dot"></span><span id="status-text">Disconnected</span></span>
    <span class="cb-btns">
      <button class="cb-btn" id="select-mode-btn">Select</button>
      <button class="cb-btn" id="copy-btn">Copy</button>
      <button class="cb-btn" id="disconnect-btn">Disconnect</button>
    </span>
    <span id="status-size"></span>
  </div>
  <div id="keyboard">
    <!-- Paste row -->
    <div class="paste-row">
      <input type="text" id="paste-input" placeholder="Paste here..." autocapitalize="off" autocorrect="off">
      <button id="paste-btn">Paste</button>
    </div>
    <!-- Shortcut + Tmux keys grid -->
    <div class="shortcut-grid">
      <button class="shortcut-key tab-key" data-seq="&#x09;">Tab</button>
      <button class="shortcut-key" data-seq="&#x1b;">Esc</button>
      <button class="shortcut-key" data-seq="&#x03;">^C</button>
      <button class="shortcut-key" data-seq="&#x0c;">^L</button>
      <button class="shortcut-key" data-seq="&#x1a;">^Z</button>
      <button class="shortcut-key" data-seq="&#x17;">^W</button>
      <button class="shortcut-key enter-key" data-seq="&#x0d;">Enter</button>
      <button class="shortcut-key" data-macro="tmux-detach">^B+D</button>
      <button class="shortcut-key" data-macro="tmux-prev-session">^B+(</button>
      <button class="shortcut-key" data-macro="tmux-next-session">^B+)</button>
      <button class="shortcut-key" data-macro="tmux-session-list">^B+S</button>
      <button class="shortcut-key" data-macro="tmux-clear">Clear</button>
    </div>
    <!-- Quick actions row -->
    <div class="quick-row">
      <button class="quick-btn" id="quick-upload-btn">Upload</button>
      <button class="quick-btn" id="quick-cd-btn">cd...</button>
      <button class="quick-btn" id="quick-tmux-work-btn">tmux work</button>
      <button class="quick-btn" id="quick-tmux-new-btn">tmux new</button>
      <button class="quick-btn" id="quick-download-btn">Download</button>
    </div>
    <input type="file" id="upload-file-input" multiple style="display:none">
    <!-- Arrow keys + PgUp/PgDn -->
    <div class="arrow-row">
      <button class="arrow-key pg" data-seq="&#x1b;[5~">PgUp</button>
      <button class="arrow-key" data-seq="&#x1b;[D">&#x25C0;</button>
      <button class="arrow-key" data-seq="&#x1b;[B">&#x25BC;</button>
      <button class="arrow-key" data-seq="&#x1b;[A">&#x25B2;</button>
      <button class="arrow-key" data-seq="&#x1b;[C">&#x25B6;</button>
      <button class="arrow-key pg" data-seq="&#x1b;[6~">PgDn</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
<script>
(function() {
  'use strict';

  // --- State ---
  let selectMode = false;
  let sshConnected = false;
  let ws = null;
  let term = null;
  let fitAddon = null;
  const encoder = new TextEncoder();
  const decoder = new TextDecoder();

  // --- Host API ---
  async function apiGetHosts() {
    const res = await fetch('/api/hosts');
    return res.ok ? res.json() : [];
  }

  async function apiCreateHost(data) {
    const res = await fetch('/api/hosts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    return res.json();
  }

  async function apiUpdateHost(id, data) {
    const res = await fetch('/api/hosts/' + id, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    return res.json();
  }

  async function apiDeleteHost(id) {
    await fetch('/api/hosts/' + id, { method: 'DELETE' });
  }

  // --- Terminal setup ---
  function initTerminal() {
    term = new Terminal({
      fontSize: 14,
      fontFamily: '"SF Mono","Cascadia Code","Fira Code",Menlo,Consolas,monospace',
      cursorStyle: 'bar',
      cursorBlink: true,
      allowProposedApi: true,
      scrollback: 5000,
      theme: {
        foreground: '#c0caf5',
        background: '#1a1b26',
        cursor: '#c0caf5',
        selectionBackground: '#33467c',
        black: '#15161e', red: '#f7768e', green: '#9ece6a', yellow: '#e0af68',
        blue: '#7aa2f7', magenta: '#bb9af7', cyan: '#7dcfff', white: '#a9b1d6',
        brightBlack: '#414868', brightRed: '#f7768e', brightGreen: '#9ece6a',
        brightYellow: '#e0af68', brightBlue: '#7aa2f7', brightMagenta: '#bb9af7',
        brightCyan: '#7dcfff', brightWhite: '#c0caf5'
      }
    });

    fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.loadAddon(new WebLinksAddon.WebLinksAddon());
    term.open(document.getElementById('terminal'));
    fitAddon.fit();

    // Forward keyboard input to WebSocket
    term.onData((data) => sendInput(data));

    new ResizeObserver(() => {
      fitAddon.fit();
      if (ws && ws.readyState === WebSocket.OPEN) {
        sendResize();
      }
    }).observe(document.getElementById('terminal'));
  }

  // --- WebSocket / SSH connection ---
  function getWsUrl() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    return proto + '//' + location.host + '/ws';
  }

  function connect(sshConfig) {
    setStatus(false, 'Connecting...');

    ws = new WebSocket(getWsUrl(), ['tty']);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      const msg = JSON.stringify({
        host: sshConfig.host,
        port: sshConfig.port,
        username: sshConfig.username,
        password: sshConfig.password,
        columns: term.cols,
        rows: term.rows,
      });
      ws.send(encoder.encode(msg));
    };

    ws.onmessage = (ev) => {
      const data = new Uint8Array(ev.data);
      const cmd = String.fromCharCode(data[0]);
      const payload = ev.data.slice(1);

      switch (cmd) {
        case '0':
          term.write(new Uint8Array(payload));
          break;
        case '1':
          document.title = decoder.decode(payload);
          break;
        case '2':
          try {
            const prefs = JSON.parse(decoder.decode(payload));
            if (prefs.status === 'connected') {
              sshConnected = true;
              hideHostsPage();
              document.getElementById('login-overlay').classList.add('hidden');
              setStatus(true);
              fitAddon.fit();
              sendResize();
            }
            if (prefs.fontSize) term.options.fontSize = prefs.fontSize;
          } catch {}
          break;
      }
    };

    ws.onclose = () => {
      if (!sshConnected) {
        setStatus(false, 'Connection failed');
        setTimeout(() => {
          setStatus(false);
          showHostsPage();
        }, 2000);
      } else {
        sshConnected = false;
        setStatus(false);
        term.clear();
        showHostsPage();
      }
    };

    ws.onerror = () => {
      setStatus(false, 'Server error');
      setTimeout(() => {
        setStatus(false);
        showHostsPage();
      }, 2000);
    };
  }

  function disconnect() {
    if (ws) {
      sshConnected = false;
      ws.close();
      ws = null;
    }
    setStatus(false);
    term.clear();
    showHostsPage();
  }

  function sendInput(data) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const encoded = encoder.encode(data);
    const buf = new Uint8Array(encoded.length + 1);
    buf[0] = 0x30; // '0'
    buf.set(encoded, 1);
    ws.send(buf);
  }

  function sendResize() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const msg = JSON.stringify({ columns: term.cols, rows: term.rows });
    ws.send(encoder.encode('1' + msg));
    document.getElementById('status-size').textContent = term.cols + 'x' + term.rows;
  }

  function setStatus(connected, text) {
    document.getElementById('status-dot').className = 'dot' + (connected ? ' connected' : '');
    document.getElementById('status-text').textContent = text || (connected ? 'Connected' : 'Disconnected');
    if (connected) {
      document.getElementById('status-size').textContent = term.cols + 'x' + term.rows;
    }
  }

  // --- Scroll actions ---
  function isAlternateBuffer() {
    return term.buffer.active.type === 'alternate';
  }

  function sendMouseWheel(up, count) {
    if (!isAlternateBuffer()) return;
    const btn = up ? 64 : 65;
    for (let i = 0; i < count; i++) {
      sendInput('\x1b[<' + btn + ';1;1M');
    }
  }

  function handleScrollAction(action) {
    switch (action) {
      case 'scroll-up':    term.scrollLines(-1); sendMouseWheel(true, 1); break;
      case 'scroll-down':  term.scrollLines(1);  sendMouseWheel(false, 1); break;
      case 'scroll-up-5':  term.scrollLines(-5); sendMouseWheel(true, 5); break;
      case 'scroll-down-5':term.scrollLines(5);  sendMouseWheel(false, 5); break;
      case 'scroll-top':   term.scrollToTop();   sendMouseWheel(true, 100); break;
      case 'scroll-bottom':term.scrollToBottom(); sendMouseWheel(false, 100); break;
    }
  }

  // --- Host list rendering ---
  let hostsCache = [];

  async function refreshHostStatus() {
    try {
      const resp = await fetch('/api/hosts/status');
      const status = await resp.json();
      for (const [id, online] of Object.entries(status)) {
        const dot = document.getElementById('status-' + id);
        if (dot) {
          dot.className = 'host-status ' + (online ? 'online' : 'offline');
          dot.title = online ? 'Online' : 'Offline';
        }
      }
    } catch (e) { /* ignore */ }
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

    document.getElementById('hosts-page').classList.remove('hidden');
    await renderHosts();

    // Host list click delegation

    // Quick connect

    // SSH quick connect form
    const connectBtn = document.getElementById('ssh-connect-btn');
    const loginInputs = document.querySelectorAll('#login-form input');

    function doConnect() {
      const host = document.getElementById('ssh-host').value.trim();

    // Disconnect button

    });

    // Shortcut keys
    const MACROS = {
      'tmux-detach':       ['\x02', 'd'],
      'tmux-prev-session': ['\x02', '('],
      'tmux-next-session': ['\x02', ')'],
      'tmux-session-list': ['\x02', 's'],
      'tmux-clear':        'clear && tmux clear-history\r',
    };
    document.querySelectorAll('.shortcut-key').forEach(btn => {
      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        const macro = MACROS[btn.dataset.macro];
        if (Array.isArray(macro)) {
          sendInput(macro[0]);
          setTimeout(() => sendInput(macro[1]), 50);
        } else if (typeof macro === 'string') {
          sendInput(macro);
        } else {
          sendInput(btn.dataset.seq);
        }

    // Arrow keys
    document.querySelectorAll('.arrow-key').forEach(btn => {
      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        sendInput(btn.dataset.seq);
      });
    });

    // --- Quick actions ---
    // File browser state
    let fbCurrentPath = '';
    let fbMode = 'cd'; // 'cd', 'upload', 'download'

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      return (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
    }

    async function fbNavigate(path) {
      const res = await fetch('/api/browse?path=' + encodeURIComponent(path));
      if (!res.ok) return;
      const data = await res.json();
      fbCurrentPath = data.path;
      document.getElementById('fb-path').textContent = data.path;
      const list = document.getElementById('fb-list');
      const parentPath = data.path.replace(/\/[^/]+$/, '') || '/';
      let html = `<div class="dir-item parent" data-path="${parentPath}"><span class="icon">&#x2B06;</span> ..</div>`;
      html += data.dirs.map(d =>
        `<div class="dir-item" data-path="${data.path === '/' ? '' : data.path}/${d}"><span class="icon">&#x1F4C1;</span> ${d}</div>`
      ).join('');

        html += data.files.map(f =>
          `<div class="file-item" data-path="${data.path === '/' ? '' : data.path}/${f.name}"><span class="left"><span class="icon">&#x1F4C4;</span><span class="name">${f.name}</span></span><span class="size">${formatSize(f.size)}</span></div>`
        ).join('');

    function openFileBrowser(mode) {

    document.getElementById('quick-cd-btn').addEventListener('pointerdown', async (e) => {

    document.getElementById('quick-upload-btn').addEventListener('pointerdown', async (e) => {

    document.getElementById('fb-list').addEventListener('click', async (e) => {

      const fileItem = e.target.closest('.file-item');

    document.getElementById('fb-select').addEventListener('click', () => {
      if (fbCurrentPath) {
        sendInput('cd ' + fbCurrentPath.replace(/ /g, '\\ ') + '\r');

      document.getElementById('filebrowser-overlay').classList.add('hidden');

    // Upload
    document.getElementById('fb-upload').addEventListener('click', () => {

    document.getElementById('upload-file-input').addEventListener('change', async (e) => {

    document.getElementById('fb-close').addEventListener('click', () => {
      document.getElementById('filebrowser-overlay').classList.add('hidden');

    // tmux work
    document.getElementById('quick-tmux-work-btn').addEventListener('pointerdown', (e) => {

    });

    // tmux new (prompt for name)
    document.getElementById('quick-tmux-new-btn').addEventListener('pointerdown', (e) => {
      e.preventDefault();
      document.getElementById('tp-name').value = '';
      document.getElementById('tmux-prompt-overlay').classList.remove('hidden');
      setTimeout(() => document.getElementById('tp-name').focus(), 50);
    });

    function doTmuxNew() {
      const name = document.getElementById('tp-name').value.trim();
      if (name) {
        sendInput('tmux new -s ' + name.replace(/ /g, '-') + '\r');
      }

    document.getElementById('tp-confirm').addEventListener('click', doTmuxNew);
    document.getElementById('tp-cancel').addEventListener('click', () => {
      document.getElementById('tmux-prompt-overlay').classList.add('hidden');
    });
    document.getElementById('tp-close').addEventListener('click', () => {
      document.getElementById('tmux-prompt-overlay').classList.add('hidden');
    });
    document.getElementById('tp-name').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); doTmuxNew(); }
    });

    // Touch scrolling on terminal area (with over-scroll support)
    const termWrap = document.getElementById('terminal-wrap');
    const termEl = document.getElementById('terminal');
    let touchStartY = null;
    let touchAccum = 0;
    let overScrollY = 0;
    const SCROLL_THRESHOLD = 20;
    const MAX_OVERSCROLL = 300;

    function isAtBottom() {
      const buf = term.buffer.active;
      return buf.viewportY >= buf.baseY;
    }

    function applyOverScroll() {
      termEl.style.transform = overScrollY > 0 ? `translateY(-${overScrollY}px)` : '';
    }

    // Double-tap to send Tab
    let lastTapTime = 0;
    let touchMoved = false;

    termWrap.addEventListener('touchstart', (e) => {
      if (selectMode) return;
      touchMoved = false;
      if (e.touches.length === 1) {
        touchStartY = e.touches[0].clientY;
        touchAccum = 0;
      }
    }, { passive: true });

    termWrap.addEventListener('touchend', (e) => {
      if (selectMode || touchMoved) return;
      const now = Date.now();
      if (now - lastTapTime < 300) {
        sendInput('\t');
        lastTapTime = 0;
      } else {
        lastTapTime = now;
      }
    }, { passive: true });

    termWrap.addEventListener('touchmove', (e) => {
      if (selectMode) return;
      if (touchStartY === null || e.touches.length !== 1) return;
      e.preventDefault();
      touchMoved = true;
      const deltaY = touchStartY - e.touches[0].clientY;
      touchStartY = e.touches[0].clientY;

      // If over-scrolled and swiping down (deltaY < 0), reduce over-scroll first
      if (overScrollY > 0 && deltaY < 0) {
        overScrollY = Math.max(0, overScrollY + deltaY);
        applyOverScroll();
        return;
      }

      touchAccum += deltaY;
      const lines = Math.trunc(touchAccum / SCROLL_THRESHOLD);
      if (lines !== 0) {
        if (lines > 0 && isAtBottom() && !isAlternateBuffer()) {
          // At bottom, allow over-scroll to push content up
          overScrollY = Math.min(MAX_OVERSCROLL, overScrollY + Math.abs(lines) * SCROLL_THRESHOLD);
          applyOverScroll();
        } else {
          term.scrollLines(lines);
          sendMouseWheel(lines < 0, Math.abs(lines));
        }
        touchAccum -= lines * SCROLL_THRESHOLD;
      }
    }, { passive: false });

    termWrap.addEventListener('touchend', () => {
      touchStartY = null;
      touchAccum = 0;
    }, { passive: true });

    // Reset over-scroll when new output arrives (content changed)
    term.onWriteParsed(() => {
      if (overScrollY > 0) {
        overScrollY = 0;
        applyOverScroll();
      }
    });

    // --- Select / Copy / Paste ---
    function flashBtn(btn) {
      btn.classList.add('flash');
      setTimeout(() => btn.classList.remove('flash'), 300);
    }

    let selectStart = null;

    function touchToCell(touch) {
      const screen = termEl.querySelector('.xterm-screen');
      if (!screen) return null;
      const rect = screen.getBoundingClientRect();
      const x = touch.clientX - rect.left;
      const y = touch.clientY - rect.top;
      const cellW = rect.width / term.cols;
      const cellH = rect.height / term.rows;
      const col = Math.max(0, Math.min(term.cols - 1, Math.floor(x / cellW)));
      const viewportRow = Math.max(0, Math.min(term.rows - 1, Math.floor(y / cellH)));
      const bufferRow = viewportRow + term.buffer.active.viewportY;
      return { col, row: bufferRow };
    }

    function updateSelection(endCell) {
      if (!selectStart || !endCell) return;
      let startOff = selectStart.row * term.cols + selectStart.col;
      let endOff = endCell.row * term.cols + endCell.col;
      let sCol = selectStart.col, sRow = selectStart.row;
      if (endOff < startOff) {
        sCol = endCell.col;
        sRow = endCell.row;
        const tmp = startOff;
        startOff = endOff;
        endOff = tmp;
      }
      const length = endOff - startOff + 1;
      term.select(sCol, sRow, length);
    }

    termEl.addEventListener('touchstart', (e) => {
      if (!selectMode || e.touches.length !== 1) return;
      e.preventDefault();
      e.stopPropagation();
      term.clearSelection();
      selectStart = touchToCell(e.touches[0]);
    }, { capture: true });

    termEl.addEventListener('touchmove', (e) => {
      if (!selectMode || !selectStart || e.touches.length !== 1) return;
      e.preventDefault();
      e.stopPropagation();
      updateSelection(touchToCell(e.touches[0]));
    }, { capture: true });

    termEl.addEventListener('touchend', (e) => {
      if (!selectMode || !selectStart) return;
      e.preventDefault();
      e.stopPropagation();
      updateSelection(touchToCell(e.changedTouches[0]));
      selectStart = null;
    }, { capture: true });

    document.getElementById('select-mode-btn').addEventListener('click', (e) => {
      e.preventDefault();
      selectMode = !selectMode;
      document.getElementById('select-mode-btn').classList.toggle('active', selectMode);
      // In select mode, prevent keyboard popup which causes resize and clears selection
      const xtermTextarea = document.querySelector('#terminal .xterm-helper-textarea');
      if (xtermTextarea) {
        if (selectMode) {
          xtermTextarea.setAttribute('readonly', 'readonly');
          xtermTextarea.setAttribute('inputmode', 'none');
          xtermTextarea.blur();
        } else {
          xtermTextarea.removeAttribute('readonly');
          xtermTextarea.removeAttribute('inputmode');
        }
      }
    });

    document.getElementById('copy-btn').addEventListener('click', async (e) => {
      e.preventDefault();
      const sel = term.getSelection();
      if (sel) {
        try {
          await navigator.clipboard.writeText(sel);
          flashBtn(document.getElementById('copy-btn'));
        } catch {
          const ta = document.createElement('textarea');
          ta.value = sel;
          ta.style.position = 'fixed';
          ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          flashBtn(document.getElementById('copy-btn'));
        }
      }
    });

    const pasteInput = document.getElementById('paste-input');
    document.getElementById('paste-btn').addEventListener('click', (e) => {
      e.preventDefault();
      const text = pasteInput.value;
      if (text) {
        sendInput(text);
        pasteInput.value = '';
        flashBtn(document.getElementById('paste-btn'));
      }
    });
    pasteInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('paste-btn').click();
      }
    });

    // Window resize
    window.addEventListener('resize', () => {
      fitAddon.fit();
      sendResize();
    });
  }

  // --- Init ---
  document.addEventListener('DOMContentLoaded', () => {
    initTerminal();
    bindEvents();
    showHostsPage();
  });
})();
</script>
</body>
</html>
