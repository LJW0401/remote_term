<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Remote Term</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: #1a1b26; color: #c0caf5; font-family: system-ui, sans-serif; touch-action: manipulation; }

#app { display: flex; flex-direction: column; height: 100dvh; }

/* Terminal area - top half */
#terminal-wrap {
  flex: 1; min-height: 0; position: relative; background: #1a1b26;
}
#terminal { height: 100%; overflow: hidden; }
#terminal .xterm { height: 100%; padding: 4px; }
#terminal .xterm-viewport { touch-action: none; }

/* Status bar */
#status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 10px; background: #24283b; font-size: 12px; color: #565f89;
  border-top: 1px solid #3b4261; border-bottom: 1px solid #3b4261;
  flex-shrink: 0;
}
#status-bar .dot { width: 8px; height: 8px; border-radius: 50%; background: #f7768e; margin-right: 6px; display: inline-block; }
#status-bar .dot.connected { background: #9ece6a; }
#status-bar .cb-btns { display: flex; gap: 6px; }
.cb-btn {
  border: none; border-radius: 4px; padding: 3px 10px;
  background: #3b4261; color: #7aa2f7; font-size: 12px; font-weight: 600;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.cb-btn:active { background: #545c7e; }
.cb-btn.flash { background: #9ece6a; color: #1a1b26; transition: none; }
#select-mode-btn.active { background: #e0af68; color: #1a1b26; }

/* Keyboard area - bottom half */
#keyboard {
  flex-shrink: 0; background: #1f2335; padding: 6px 4px;
  user-select: none; -webkit-user-select: none;
}

/* Modifier row */
.mod-row {
  display: flex; gap: 4px; margin-bottom: 5px; padding: 0 2px;
}
.mod-btn {
  flex: 1; height: 36px; border: none; border-radius: 6px;
  background: #3b4261; color: #7aa2f7; font-size: 13px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.mod-btn.active { background: #7aa2f7; color: #1a1b26; }
.mod-btn:active { background: #545c7e; }

/* Key rows */
.key-row {
  display: flex; gap: 3px; margin-bottom: 3px; padding: 0 2px; justify-content: center;
}
.key {
  min-width: 32px; height: 40px; border: none; border-radius: 6px;
  background: #292e42; color: #c0caf5; font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex: 1; max-width: 44px;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.08s;
}
.key:active { background: #3b4261; }
.key.wide { flex: 1.6; max-width: 72px; font-size: 12px; color: #7aa2f7; }
.key.space { flex: 5; max-width: none; }
.key.enter-key { background: #7aa2f7; color: #1a1b26; font-weight: 600; }
.key.enter-key:active { background: #89b4fa; }

/* Arrow keys cluster */
.arrow-row {
  display: flex; gap: 3px; justify-content: center; margin-bottom: 3px; padding: 0 2px;
}
.arrow-key {
  width: 48px; height: 36px; border: none; border-radius: 6px;
  background: #292e42; color: #bb9af7; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.arrow-key:active { background: #3b4261; }

/* Layer switch tabs */
.layer-tabs {
  display: flex; gap: 4px; margin-bottom: 5px; padding: 0 2px;
}
.layer-tab {
  flex: 1; height: 30px; border: none; border-radius: 6px;
  background: #292e42; color: #565f89; font-size: 12px; font-weight: 600;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.layer-tab.active { background: #3b4261; color: #c0caf5; }
</style>
</head>
<body>
<div id="app">
  <div id="terminal-wrap"><div id="terminal"></div></div>
  <div id="status-bar">
    <span><span class="dot" id="status-dot"></span><span id="status-text">Connecting...</span></span>
    <span class="cb-btns">
      <button class="cb-btn" id="select-mode-btn">Select</button>
      <button class="cb-btn" id="copy-btn">Copy</button>
      <button class="cb-btn" id="paste-btn">Paste</button>
    </span>
    <span id="status-size"></span>
  </div>
  <div id="keyboard">
    <!-- Modifier keys -->
    <div class="mod-row">
      <button class="mod-btn" data-mod="ctrl" id="mod-ctrl">Ctrl</button>
      <button class="mod-btn" data-mod="alt" id="mod-alt">Alt</button>
      <button class="mod-btn" data-mod="shift" id="mod-shift">Shift</button>
      <button class="mod-btn" data-mod="fn" id="mod-fn">Fn</button>
    </div>
    <!-- Layer tabs -->
    <div class="layer-tabs">
      <button class="layer-tab active" data-layer="alpha">ABC</button>
      <button class="layer-tab" data-layer="num">123</button>
      <button class="layer-tab" data-layer="sym">!@#</button>
    </div>
    <!-- Key layers (populated by JS) -->
    <div id="key-layers"></div>
    <!-- Arrow keys (always visible) -->
    <div class="arrow-row">
      <button class="arrow-key" data-seq="&#x1b;[D">&#x25C0;</button>
      <button class="arrow-key" data-seq="&#x1b;[B">&#x25BC;</button>
      <button class="arrow-key" data-seq="&#x1b;[A">&#x25B2;</button>
      <button class="arrow-key" data-seq="&#x1b;[C">&#x25B6;</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
<script>
(function() {
  'use strict';

  // --- Keyboard layout definitions ---
  const LAYERS = {
    alpha: [
      ['q','w','e','r','t','y','u','i','o','p'],
      ['a','s','d','f','g','h','j','k','l'],
      [{l:'Tab',w:true,seq:'\t'},'z','x','c','v','b','n','m',{l:'Del',w:true,seq:'\x7f'}],
      [{l:'Esc',w:true,seq:'\x1b'},{l:'Space',cls:'space',ch:' '},{l:'Enter',cls:'enter-key',seq:'\r'}]
    ],
    num: [
      ['1','2','3','4','5','6','7','8','9','0'],
      ['-','=','[',']','\\',';',"'",',','.'],
      [{l:'Tab',w:true,seq:'\t'},'/','`','~','!','@','#','$',{l:'Del',w:true,seq:'\x7f'}],
      [{l:'Esc',w:true,seq:'\x1b'},{l:'Space',cls:'space',ch:' '},{l:'Enter',cls:'enter-key',seq:'\r'}]
    ],
    sym: [
      ['!','@','#','$','%','^','&','*','(',')'],
      ['_','+','{','}','|',':','"','<','>'],
      [{l:'Tab',w:true,seq:'\t'},'?','~','`','\\','/','.','=',{l:'Del',w:true,seq:'\x7f'}],
      [{l:'Esc',w:true,seq:'\x1b'},{l:'Space',cls:'space',ch:' '},{l:'Enter',cls:'enter-key',seq:'\r'}]
    ]
  };

  // Fn layer: F1-F12, Home/End, PgUp/PgDn
  const FN_LAYER = [
    [{l:'F1',seq:'\x1bOP'},{l:'F2',seq:'\x1bOQ'},{l:'F3',seq:'\x1bOR'},{l:'F4',seq:'\x1bOS'},{l:'F5',seq:'\x1b[15~'},{l:'F6',seq:'\x1b[17~'}],
    [{l:'F7',seq:'\x1b[18~'},{l:'F8',seq:'\x1b[19~'},{l:'F9',seq:'\x1b[20~'},{l:'F10',seq:'\x1b[21~'},{l:'F11',seq:'\x1b[23~'},{l:'F12',seq:'\x1b[24~'}],
    [{l:'Home',seq:'\x1b[H'},{l:'End',seq:'\x1b[F'},{l:'PgUp',seq:'\x1b[5~'},{l:'PgDn',seq:'\x1b[6~'},{l:'Ins',seq:'\x1b[2~'},{l:'Del',seq:'\x1b[3~'}],
    [{l:'▲Ln',action:'scroll-up'},{l:'▼Ln',action:'scroll-down'},{l:'▲5Ln',action:'scroll-up-5'},{l:'▼5Ln',action:'scroll-down-5'},{l:'Top',action:'scroll-top'},{l:'Btm',action:'scroll-bottom'}],
    [{l:'Esc',w:true,seq:'\x1b'},{l:'Space',cls:'space',ch:' '},{l:'Enter',cls:'enter-key',seq:'\r'}]
  ];

  // --- State ---
  let currentLayer = 'alpha';
  let mods = { ctrl: false, alt: false, shift: false, fn: false };
  let selectMode = false;
  let ws = null;
  let term = null;
  let fitAddon = null;
  const encoder = new TextEncoder();
  const decoder = new TextDecoder();

  // --- Terminal setup ---
  function initTerminal() {
    term = new Terminal({
      fontSize: 14,
      fontFamily: '"SF Mono","Cascadia Code","Fira Code",Menlo,Consolas,monospace',
      cursorStyle: 'bar',
      cursorBlink: true,
      allowProposedApi: true,
      scrollback: 5000,
      theme: {
        foreground: '#c0caf5',
        background: '#1a1b26',
        cursor: '#c0caf5',
        selectionBackground: '#33467c',
        black: '#15161e', red: '#f7768e', green: '#9ece6a', yellow: '#e0af68',
        blue: '#7aa2f7', magenta: '#bb9af7', cyan: '#7dcfff', white: '#a9b1d6',
        brightBlack: '#414868', brightRed: '#f7768e', brightGreen: '#9ece6a',
        brightYellow: '#e0af68', brightBlue: '#7aa2f7', brightMagenta: '#bb9af7',
        brightCyan: '#7dcfff', brightWhite: '#c0caf5'
      }
    });

    fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.loadAddon(new WebLinksAddon.WebLinksAddon());
    term.open(document.getElementById('terminal'));
    fitAddon.fit();

    // Disable default keyboard handling (we use our custom keyboard)
    term.attachCustomKeyEventHandler(() => false);

    new ResizeObserver(() => {
      fitAddon.fit();
      if (ws && ws.readyState === WebSocket.OPEN) {
        sendResize();
      }
    }).observe(document.getElementById('terminal'));
  }

  // --- WebSocket ---
  function getWsUrl() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const base = location.pathname.replace(/\/+$/, '');
    return proto + '//' + location.host + base + '/ws';
  }

  async function fetchToken() {
    const base = location.pathname.replace(/\/+$/, '');
    try {
      const resp = await fetch(base + '/token');
      const data = await resp.json();
      return data.token || '';
    } catch {
      return '';
    }
  }

  async function connect() {
    const token = await fetchToken();
    ws = new WebSocket(getWsUrl(), ['tty']);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      const cols = term.cols;
      const rows = term.rows;
      const msg = JSON.stringify({ AuthToken: token, columns: cols, rows: rows });
      ws.send(encoder.encode(msg));
      setStatus(true);
    };

    ws.onmessage = (ev) => {
      const data = new Uint8Array(ev.data);
      const cmd = String.fromCharCode(data[0]);
      const payload = ev.data.slice(1);

      switch (cmd) {
        case '0':
          term.write(new Uint8Array(payload));
          break;
        case '1':
          document.title = decoder.decode(payload);
          break;
        case '2':
          try {
            const prefs = JSON.parse(decoder.decode(payload));
            if (prefs.fontSize) term.options.fontSize = prefs.fontSize;
            fitAddon.fit();
          } catch {}
          break;
      }
    };

    ws.onclose = () => {
      setStatus(false);
      setTimeout(connect, 3000);
    };

    ws.onerror = () => {
      setStatus(false);
    };
  }

  function sendInput(data) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const encoded = encoder.encode(data);
    const buf = new Uint8Array(encoded.length + 1);
    buf[0] = 0x30; // '0'
    buf.set(encoded, 1);
    ws.send(buf);
  }

  function sendResize() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const msg = JSON.stringify({ columns: term.cols, rows: term.rows });
    ws.send(encoder.encode('1' + msg));
    document.getElementById('status-size').textContent = term.cols + 'x' + term.rows;
  }

  function setStatus(connected) {
    document.getElementById('status-dot').className = 'dot' + (connected ? ' connected' : '');
    document.getElementById('status-text').textContent = connected ? 'Connected' : 'Disconnected';
    if (connected) {
      document.getElementById('status-size').textContent = term.cols + 'x' + term.rows;
    }
  }

  // --- Keyboard rendering ---
  function renderKeyboard() {
    const container = document.getElementById('key-layers');
    container.innerHTML = '';
    const rows = mods.fn ? FN_LAYER : LAYERS[currentLayer];

    rows.forEach(row => {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'key-row';
      row.forEach(k => {
        const btn = document.createElement('button');
        if (typeof k === 'string') {
          const display = (mods.shift && currentLayer === 'alpha') ? k.toUpperCase() : k;
          btn.className = 'key';
          btn.textContent = display;
          btn.dataset.ch = display;
        } else {
          btn.className = 'key' + (k.w ? ' wide' : '') + (k.cls ? ' ' + k.cls : '');
          btn.textContent = k.l;
          if (k.seq) btn.dataset.seq = k.seq;
          if (k.ch) btn.dataset.ch = k.ch;
          if (k.action) btn.dataset.action = k.action;
        }
        rowDiv.appendChild(btn);
      });
      container.appendChild(rowDiv);
    });
  }

  // --- Scroll actions (works in both normal shell and tmux with mouse on) ---
  function sendMouseWheel(up, count) {
    // Send SGR mouse wheel escape sequences for tmux/vim/less compatibility
    // Button 64 = wheel up, 65 = wheel down (SGR encoding)
    const btn = up ? 64 : 65;
    for (let i = 0; i < count; i++) {
      sendInput('\x1b[<' + btn + ';1;1M');
    }
  }

  function handleScrollAction(action) {
    switch (action) {
      case 'scroll-up':
        term.scrollLines(-1);
        sendMouseWheel(true, 1);
        break;
      case 'scroll-down':
        term.scrollLines(1);
        sendMouseWheel(false, 1);
        break;
      case 'scroll-up-5':
        term.scrollLines(-5);
        sendMouseWheel(true, 5);
        break;
      case 'scroll-down-5':
        term.scrollLines(5);
        sendMouseWheel(false, 5);
        break;
      case 'scroll-top':
        term.scrollToTop();
        sendMouseWheel(true, 100);
        break;
      case 'scroll-bottom':
        term.scrollToBottom();
        sendMouseWheel(false, 100);
        break;
    }
  }

  // --- Input processing ---
  function processKey(ch, seq) {
    let data = seq || ch;
    if (!data) return;

    // Apply shift to single chars
    if (mods.shift && ch && ch.length === 1 && !seq) {
      data = ch.toUpperCase();
    }

    // Ctrl modifier: convert a-z to control characters
    if (mods.ctrl && data.length === 1) {
      const code = data.toUpperCase().charCodeAt(0);
      if (code >= 65 && code <= 90) {
        data = String.fromCharCode(code - 64);
      }
    }

    // Alt modifier: prepend ESC
    if (mods.alt && data.length === 1) {
      data = '\x1b' + data;
    }

    sendInput(data);

    // Auto-release one-shot modifiers (except when locked via double-tap, not implemented yet)
    if (mods.ctrl) { mods.ctrl = false; document.getElementById('mod-ctrl').classList.remove('active'); }
    if (mods.alt) { mods.alt = false; document.getElementById('mod-alt').classList.remove('active'); }
    if (mods.shift) {
      mods.shift = false;
      document.getElementById('mod-shift').classList.remove('active');
      if (currentLayer === 'alpha') renderKeyboard();
    }
  }

  // --- Event binding ---
  function bindEvents() {
    // Modifier buttons
    document.querySelectorAll('.mod-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        const mod = btn.dataset.mod;
        mods[mod] = !mods[mod];
        btn.classList.toggle('active', mods[mod]);
        if (mod === 'fn' || (mod === 'shift' && currentLayer === 'alpha')) {
          renderKeyboard();
        }
      });
    });

    // Layer tabs
    document.querySelectorAll('.layer-tab').forEach(tab => {
      tab.addEventListener('click', (e) => {
        e.preventDefault();
        currentLayer = tab.dataset.layer;
        document.querySelectorAll('.layer-tab').forEach(t => t.classList.toggle('active', t === tab));
        renderKeyboard();
      });
    });

    // Key press (event delegation)
    document.getElementById('key-layers').addEventListener('pointerdown', (e) => {
      const btn = e.target.closest('.key');
      if (!btn) return;
      e.preventDefault();
      if (btn.dataset.action) {
        handleScrollAction(btn.dataset.action);
      } else {
        processKey(btn.dataset.ch, btn.dataset.seq);
      }
    });

    // Arrow keys
    document.querySelectorAll('.arrow-key').forEach(btn => {
      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        processKey(null, btn.dataset.seq);
      });
    });

    // Touch scrolling on terminal area
    const termEl = document.getElementById('terminal');
    let touchStartY = null;
    let touchAccum = 0;
    const SCROLL_THRESHOLD = 20; // pixels per line scroll

    termEl.addEventListener('touchstart', (e) => {
      if (selectMode) return; // let browser handle selection
      if (e.touches.length === 1) {
        touchStartY = e.touches[0].clientY;
        touchAccum = 0;
      }
    }, { passive: true });

    termEl.addEventListener('touchmove', (e) => {
      if (selectMode) return; // let browser handle selection
      if (touchStartY === null || e.touches.length !== 1) return;
      e.preventDefault();
      const deltaY = touchStartY - e.touches[0].clientY;
      touchAccum += deltaY;
      touchStartY = e.touches[0].clientY;

      const lines = Math.trunc(touchAccum / SCROLL_THRESHOLD);
      if (lines !== 0) {
        term.scrollLines(lines);
        touchAccum -= lines * SCROLL_THRESHOLD;
      }
    }, { passive: false });

    termEl.addEventListener('touchend', () => {
      touchStartY = null;
      touchAccum = 0;
    }, { passive: true });

    // --- Select / Copy / Paste ---
    function flashBtn(btn) {
      btn.classList.add('flash');
      setTimeout(() => btn.classList.remove('flash'), 300);
    }

    // Select mode toggle: switches between scroll mode and text selection mode
    document.getElementById('select-mode-btn').addEventListener('click', (e) => {
      e.preventDefault();
      selectMode = !selectMode;
      document.getElementById('select-mode-btn').classList.toggle('active', selectMode);
      // In select mode, allow native text selection on the terminal
      const viewport = document.querySelector('#terminal .xterm-viewport');
      if (viewport) viewport.style.touchAction = selectMode ? 'auto' : 'none';
    });

    // Copy: copy xterm selection to clipboard
    document.getElementById('copy-btn').addEventListener('click', async (e) => {
      e.preventDefault();
      const sel = term.getSelection();
      if (sel) {
        try {
          await navigator.clipboard.writeText(sel);
          flashBtn(document.getElementById('copy-btn'));
        } catch {
          // Fallback for older browsers
          const ta = document.createElement('textarea');
          ta.value = sel;
          ta.style.position = 'fixed';
          ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          flashBtn(document.getElementById('copy-btn'));
        }
      }
    });

    // Paste: read clipboard and send to terminal
    document.getElementById('paste-btn').addEventListener('click', async (e) => {
      e.preventDefault();
      try {
        const text = await navigator.clipboard.readText();
        if (text) {
          sendInput(text);
          flashBtn(document.getElementById('paste-btn'));
        }
      } catch {
        // Clipboard API denied — show a temporary input for manual paste
        const input = document.createElement('input');
        input.type = 'text';
        input.style.cssText = 'position:fixed;top:50%;left:10%;width:80%;font-size:16px;padding:8px;z-index:999;border-radius:8px;border:2px solid #7aa2f7;background:#1f2335;color:#c0caf5;';
        input.placeholder = 'Paste here, then press Enter';
        document.body.appendChild(input);
        input.focus();
        input.addEventListener('keydown', (ev) => {
          if (ev.key === 'Enter') {
            if (input.value) sendInput(input.value);
            document.body.removeChild(input);
          } else if (ev.key === 'Escape') {
            document.body.removeChild(input);
          }
        });
        input.addEventListener('blur', () => {
          if (document.body.contains(input)) document.body.removeChild(input);
        });
      }
    });

    // Window resize
    window.addEventListener('resize', () => {
      fitAddon.fit();
      sendResize();
    });
  }

  // --- Init ---
  document.addEventListener('DOMContentLoaded', () => {
    initTerminal();
    renderKeyboard();
    bindEvents();
    connect();
  });
})();
</script>
</body>
</html>
